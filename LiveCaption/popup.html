<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; width: 240px; padding: 15px; text-align: center; background-color: #f9fafb; }
    h3 { margin-top: 0; color: #4F46E5; font-size: 18px; margin-bottom: 5px; }
    p { font-size: 12px; color: #6b7280; margin-bottom: 15px; }
    select { width: 100%; padding: 8px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #d1d5db; }
    .tts-toggle { display: flex; align-items: center; justify-content: space-between; background: #EEF2FF; border: 1px solid #C7D2FE; border-radius: 6px; padding: 8px 12px; margin-bottom: 15px; cursor: pointer; }
    .tts-toggle label { font-size: 13px; color: #4F46E5; font-weight: 600; cursor: pointer; }
    .tts-toggle input[type="checkbox"] { width: 16px; height: 16px; accent-color: #4F46E5; cursor: pointer; }
    button { background-color: #10B981; color: white; border: none; padding: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; }
    button:hover { background-color: #059669; }
  </style>
</head>
<body>
  <h3>Bhasha Live</h3>
  <p>AI Malayalam Sync</p>
  
  <select id="langSelect">
    <option value="en">Source: English</option>
    <option value="hi">Source: Hindi / Hinglish</option>
  </select>

  <div class="tts-toggle">
    <label for="ttsToggle">🔊 Malayalam Audio</label>
    <input type="checkbox" id="ttsToggle">
  </div>

  <button id="loadBtn">Load AI Captions</button>
  <script src="popup.js"></script>
</body>
</html>
