<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      width: 220px; 
      padding: 15px; 
      text-align: center; 
      background-color: #f9fafb;
    }
    h3 { margin-top: 0; color: #4F46E5; font-size: 18px; }
    p { font-size: 12px; color: #6b7280; margin-bottom: 15px; }
    button { 
      background-color: #10B981; 
      color: white; 
      border: none; 
      padding: 12px 15px; 
      font-weight: bold; 
      border-radius: 6px; 
      cursor: pointer; 
      width: 100%;
      transition: background 0.2s;
    }
    button:hover { background-color: #059669; }
    button.off { background-color: #EF4444; }
    button.off:hover { background-color: #dc2626; }
  </style>
</head>
<body>
  <h3>Bhasha Live</h3>
  <p>Translate Tab Audio to Malayalam</p>
  <button id="toggleBtn">Start Listening</button>
  <script src="popup.js"></script>
</body>
</html>
